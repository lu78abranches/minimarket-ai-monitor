<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>MiniMarket AI - Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f7fb;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            background: #111827;
            color: white;
            padding: 20px;
        }

        .sidebar h4 {
            font-weight: 600;
        }

        .sidebar a {
            color: #9ca3af;
            display: block;
            margin: 10px 0;
            text-decoration: none;
        }

        .sidebar a:hover {
            color: white;
        }

        .content {
            margin-left: 240px;
            padding: 30px;
        }

        .card {
            border: none;
            border-radius: 14px;
        }

        .kpi {
            font-size: 1.6rem;
            font-weight: 600;
        }

        .table thead {
            background: #1f2937;
            color: white;
        }

        .badge-soft {
            background: #e0f2fe;
            color: #0369a1;
        }

        .status-ok {
            color: #16a34a;
            font-weight: 600;
        }

        .status-alerta {
            color: #dc2626;
            font-weight: 700;
        }

        .chart-container {
            position: relative;
            height: 300px;
            /* controla altura */
            max-width: 400px;
            /* controla largura */
            margin: 0 auto;
            /* centraliza */
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h4>MiniMarket AI</h4>
        <hr>
        <a href="#">Dashboard</a>
        <a href="#">Relatórios</a>
        <a href="#">Auditoria</a>
    </div>

    <!-- Conteúdo -->
    <div class="content">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>📊 Dashboard de Monitoramento</h2>
            <span class="badge bg-primary">Tempo Real</span>
        </div>

        <!-- KPIs -->
        <div class="row mb-4">

            <div class="col-md-3">
                <div class="card shadow-sm p-3">
                    <div>Total Clientes</div>
                    <div class="kpi" th:text="${#lists.size(relatorios)}">0</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow-sm p-3">
                    <div>Suspeitos</div>
                    <div class="kpi text-danger"
                        th:text="${#lists.size(relatorios.?[statusAuditoria.contains('SUSPEITO')])}">
                        0
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow-sm p-3">
                    <div>Tempo Médio</div>
                    <div class="kpi">--</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow-sm p-3">
                    <div>Áreas Visitadas</div>
                    <div class="kpi">--</div>
                </div>
            </div>

        </div>

        <!-- Gráfico -->
        <div class="card shadow-sm mb-4 p-3">
            <h5>Distribuição de Status</h5>
            <div class="chart-container">
                <canvas id="statusChart"></canvas>
            </div>
        </div>

        <!-- Filtros -->
        <div class="card shadow-sm mb-4 p-3">
            <div class="row">

                <div class="col-md-6">
                    <input type="text" id="searchInput" class="form-control" placeholder="Buscar cliente...">
                </div>

                <div class="col-md-4">
                    <select id="statusFilter" class="form-select">
                        <option value="">Todos</option>
                        <option value="SUSPEITO">Suspeito</option>
                        <option value="OK">Normal</option>
                    </select>
                </div>

            </div>
        </div>

        <!-- Tabela -->
        <div class="card shadow-sm">
            <div class="card-body">

                <div class="table-responsive">
                    <table class="table align-middle" id="tabela">

                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Permanência</th>
                                <th>Locais</th>
                                <th>Status</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:each="r : ${relatorios}">

                                <td th:text="${r.personId}"></td>

                                <td th:text="${r.tempoPermanencia}"></td>

                                <td>
                                    <span th:each="local : ${r.locaisVisitados}" class="badge badge-soft me-1"
                                        th:text="${local}">
                                    </span>
                                </td>

                                <td>
                                    <span th:text="${r.statusAuditoria}"
                                        th:classappend="${r.statusAuditoria.contains('SUSPEITO') ? 'status-alerta' : 'status-ok'}">
                                    </span>
                                </td>

                            </tr>
                        </tbody>

                    </table>
                </div>

            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script>
        // Filtro simples
        const searchInput = document.getElementById("searchInput");
        const statusFilter = document.getElementById("statusFilter");

        function filtrar() {
            const search = searchInput.value.toLowerCase();
            const status = statusFilter.value;

            document.querySelectorAll("#tabela tbody tr").forEach(row => {
                const text = row.innerText.toLowerCase();

                const matchSearch = text.includes(search);
                const matchStatus = status === "" || text.includes(status.toLowerCase());

                row.style.display = (matchSearch && matchStatus) ? "" : "none";
            });
        }

        searchInput.addEventListener("keyup", filtrar);
        statusFilter.addEventListener("change", filtrar);

        // Gráfico
        const ctx = document.getElementById('statusChart');

        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Normal', 'Suspeito'],
                datasets: [{
                    data: [70, 30], // pode dinamizar depois
                }]
            }
        });

        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Normal', 'Suspeito'],
                datasets: [{
                    data: [70, 30],
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false, // permite respeitar o CSS
                plugins: {
                    legend: {
                        position: 'top'
                    }
                }
            }
        });
    </script>

</body>

</html>
